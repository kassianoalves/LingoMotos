<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LingoMotos</title>
    <script>
      (() => {
        const fallbackTheme = 'light';
        let parsedTheme = null;

        try {
          const storedTheme = localStorage.getItem('lingomotos-theme');
          parsedTheme = storedTheme ? JSON.parse(storedTheme)?.state?.theme : null;
        } catch {
          parsedTheme = null;
        }

        const theme = parsedTheme === 'dark' || parsedTheme === 'light' ? parsedTheme : fallbackTheme;

        document.documentElement.classList.add(theme);
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
